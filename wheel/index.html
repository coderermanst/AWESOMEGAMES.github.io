<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spin Wheel Rebirth Game</title>
<style>
    body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
    }
    #top-stats {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-bottom: 10px;
        font-size: 14px;
    }
    #top-stats div {
        background: #222;
        padding: 6px 10px;
        border-radius: 6px;
    }
    #wheel-container {
        position: relative;
        width: 400px;
        height: 430px;
        margin: 10px auto 0;
    }
    #pointer {
        width: 0;
        height: 0;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-bottom: 30px solid red;
        margin: 0 auto;
        position: relative;
        z-index: 2;
    }
    #wheel {
        width: 400px;
        height: 400px;
        border-radius: 50%;
        border: 8px solid #fff;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
        transition: transform 4s cubic-bezier(.17,.67,.12,1.03);
        box-shadow: 0 0 15px rgba(0,0,0,0.7);
    }
    .slice {
        position: absolute;
        width: 50%;
        height: 50%;
        top: 50%;
        left: 50%;
        transform-origin: 0% 0%;
        background: #333;
        border: 1px solid #000;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        font-size: 11px;
        text-align: center;
        padding: 4px;
        box-sizing: border-box;
    }
    button {
        padding: 8px 16px;
        font-size: 14px;
        background: #28a745;
        border: none;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        margin: 4px;
    }
    button.secondary {
        background: #007bff;
    }
    button.danger {
        background: #dc3545;
    }
    button:disabled {
        background: #555;
        cursor: not-allowed;
    }
    #controls, #upgrades, #rebirth {
        margin-top: 10px;
    }
    #log {
        max-height: 200px;
        overflow-y: auto;
        background: #222;
        padding: 10px;
        border-radius: 6px;
        margin-top: 15px;
        text-align: left;
        font-size: 12px;
    }
    #last-result {
        margin-top: 10px;
        font-size: 13px;
        color: #ddd;
    }
</style>
</head>
<body>

<h1>Spin The Wheel</h1>

<div id="top-stats">
    <div>Money: $<span id="money">0</span></div>
    <div>Spin Cost: $<span id="spinCost">10</span></div>
    <div>Rebirths: <span id="rebirths">0</span></div>
    <div>Luck Level: <span id="luckLevel">0</span></div>
    <div>Luck Power: x<span id="luckPower">1</span></div>
    <div>Total Spins: <span id="totalSpins">0</span></div>
</div>

<div id="wheel-container">
    <div id="pointer"></div>
    <div id="wheel"></div>
</div>

<div id="controls">
    <button id="spinBtn">SPIN ($10)</button>
    <button id="autoSpinBtn" class="secondary">Auto Spin: OFF</button>
</div>

<div id="upgrades">
    <button id="buyLuckBtn" class="secondary">
        Buy Luck (x10 weight) - Cost: $<span id="luckCost">100</span>
    </button>
    <button id="autoBuyLuckBtn" class="secondary">Auto Buy Luck: OFF</button>
</div>

<div id="rebirth">
    <button id="rebirthBtn" class="danger">
        Rebirth (cost: $<span id="rebirthCost">10000</span>)
    </button>
    <div style="font-size:12px;color:#ccc;margin-top:4px;">
        Rebirth makes multiplier rewards more likely and all rewards slightly easier to hit.
    </div>
</div>

<div id="last-result">No spins yet.</div>

<div id="log"></div>

<script>
/* ---------- State ---------- */
let money = 100;
const SPIN_COST = 10; // fixed
let rebirths = 0;
let luckLevel = 0;
let totalSpins = 0;

let spinning = false;
let autoSpin = false;
let autoSpinInterval = null;

let autoBuyLuck = false;
let autoBuyLuckInterval = null;

const baseLuckCost = 100;
const rebirthBaseCost = 10000;

/* ---------- Outcomes ---------- */
/*
   baseWeight is the starting weight.
   multiplier: true for the x2/x10/x999/x999999 outcomes so rebirths boost them more.
*/
const outcomes = [
    { label: "+$11",      type: "add",  value: 11,      baseWeight: 35,     multiplier: false },
    { label: "+$20",      type: "add",  value: 20,      baseWeight: 25,     multiplier: false },
    { label: "+$50",      type: "add",  value: 50,      baseWeight: 20,     multiplier: false },
    { label: "2x money",  type: "mult", value: 2,       baseWeight: 5,      multiplier: true  },
    { label: "10x money", type: "mult", value: 10,      baseWeight: 2.5,    multiplier: true  },
    { label: "999x",      type: "mult", value: 999,     baseWeight: 0.1,    multiplier: true  },
    { label: "999999x",   type: "mult", value: 999999,  baseWeight: 0.001,  multiplier: true  },
    { label: "/100",      type: "div",  value: 100,     baseWeight: 1,      multiplier: false },
    { label: "Nothing",   type: "none", value: 0,       baseWeight: 11.399, multiplier: false }
];

const wheel = document.getElementById("wheel");
const sliceAngle = 360 / outcomes.length;

/* ---------- Build visible wheel ---------- */
outcomes.forEach((o, i) => {
    const slice = document.createElement("div");
    slice.className = "slice";
    slice.style.transform = `rotate(${i * sliceAngle}deg) skewY(${90 - sliceAngle}deg)`;
    slice.style.background = `hsl(${i * 40}, 70%, 40%)`;
    slice.innerHTML = o.label;
    wheel.appendChild(slice);
});

/* ---------- Helpers ---------- */
function formatNumber(n) {
    if (n >= 1e9) return n.toExponential(2);
    if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
    if (n >= 1e3) return (n / 1e3).toFixed(2) + "K";
    return n.toFixed(2);
}

function getLuckPower() {
    return Math.pow(10, luckLevel || 0);
}

function getRebirthMultiplier(outcome) {
    const base = 1 + rebirths * 0.1; // global boost
    if (outcome.multiplier) {
        return base * (1 + rebirths * 0.4); // extra boost for multiplier rewards
    }
    return base;
}

function getOutcomeWeights() {
    const luckPower = getLuckPower();
    return outcomes.map(o => {
        let w = o.baseWeight;
        w *= luckPower;
        w *= getRebirthMultiplier(o);
        return w;
    });
}

function pickOutcome() {
    const weights = getOutcomeWeights();
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < outcomes.length; i++) {
        if (r < weights[i]) return { outcome: outcomes[i], index: i };
        r -= weights[i];
    }
    return { outcome: outcomes[outcomes.length - 1], index: outcomes.length - 1 };
}

function getLuckCost() {
    return baseLuckCost * Math.pow(5, luckLevel);
}

function getRebirthCost() {
    return rebirthBaseCost * Math.pow(10, rebirths);
}

/* ---------- UI ---------- */
const moneyEl = document.getElementById("money");
const spinCostEl = document.getElementById("spinCost");
const rebirthsEl = document.getElementById("rebirths");
const luckLevelEl = document.getElementById("luckLevel");
const luckPowerEl = document.getElementById("luckPower");
const totalSpinsEl = document.getElementById("totalSpins");
const luckCostEl = document.getElementById("luckCost");
const rebirthCostEl = document.getElementById("rebirthCost");
const lastResultEl = document.getElementById("last-result");
const logEl = document.getElementById("log");

const spinBtn = document.getElementById("spinBtn");
const autoSpinBtn = document.getElementById("autoSpinBtn");
const buyLuckBtn = document.getElementById("buyLuckBtn");
const autoBuyLuckBtn = document.getElementById("autoBuyLuckBtn");
const rebirthBtn = document.getElementById("rebirthBtn");

function updateUI() {
    moneyEl.textContent = formatNumber(money);
    spinCostEl.textContent = SPIN_COST.toFixed(2);
    rebirthsEl.textContent = rebirths;
    luckLevelEl.textContent = luckLevel;
    luckPowerEl.textContent = getLuckPower().toLocaleString();
    totalSpinsEl.textContent = totalSpins;

    luckCostEl.textContent = formatNumber(getLuckCost());
    rebirthCostEl.textContent = formatNumber(getRebirthCost());

    spinBtn.disabled = money < SPIN_COST || spinning;
    buyLuckBtn.disabled = money < getLuckCost();
    rebirthBtn.disabled = money < getRebirthCost();
}

function log(msg) {
    const div = document.createElement("div");
    div.textContent = msg;
    logEl.prepend(div);
    while (logEl.children.length > 150) {
        logEl.removeChild(logEl.lastChild);
    }
}

/* ---------- Save / Load ---------- */
function saveGame() {
    const data = { money, rebirths, luckLevel, totalSpins };
    localStorage.setItem("spinWheelRebirthGame", JSON.stringify(data));
}

function loadGame() {
    const raw = localStorage.getItem("spinWheelRebirthGame");
    if (!raw) return;
    try {
        const data = JSON.parse(raw);
        if (typeof data.money === "number") money = data.money;
        if (typeof data.rebirths === "number") rebirths = data.rebirths;
        if (typeof data.luckLevel === "number") luckLevel = data.luckLevel;
        if (typeof data.totalSpins === "number") totalSpins = data.totalSpins;
    } catch (e) {
        console.error("Failed to load save:", e);
    }
}

/* ---------- Actions ---------- */
function doSpin() {
    if (spinning) return;
    if (money < SPIN_COST) {
        lastResultEl.textContent = "Not enough money to spin.";
        return;
    }

    spinning = true;
    money -= SPIN_COST;
    totalSpins++;

    const { outcome, index } = pickOutcome();

    // Rotate wheel so that chosen slice lands at pointer (top)
    const baseRotations = 10; // full spins
    const targetAngle = 360 - (index * sliceAngle + sliceAngle / 2);
    const finalDegrees = baseRotations * 360 + targetAngle;

    wheel.style.transform = `rotate(${finalDegrees}deg)`;
    updateUI();

    setTimeout(() => {
        let before = money;

        if (outcome.type === "add") {
            money += outcome.value;
        } else if (outcome.type === "mult") {
            money *= outcome.value;
        } else if (outcome.type === "div") {
            money /= outcome.value;
        }

        lastResultEl.textContent =
            `Outcome: ${outcome.label}. Money: $${formatNumber(before)} → $${formatNumber(money)}.`;
        log(`Spin #${totalSpins}: ${outcome.label} (cost $${SPIN_COST.toFixed(2)})`);

        spinning = false;
        saveGame();
        updateUI();
    }, 4000); // match CSS transition
}

function buyLuck() {
    const cost = getLuckCost();
    if (money < cost) {
        lastResultEl.textContent = "Not enough money to buy luck.";
        return;
    }
    money -= cost;
    luckLevel++;
    lastResultEl.textContent = `Bought luck level ${luckLevel}. All weights x10 stronger.`;
    log(`Bought luck level ${luckLevel} for $${formatNumber(cost)}.`);
    saveGame();
    updateUI();
}

function doRebirth() {
    const cost = getRebirthCost();
    if (money < cost) {
        lastResultEl.textContent = "Not enough money to rebirth.";
        return;
    }
    money -= cost;
    rebirths++;
    // keep money, luck, etc. (you can change this if you want a full reset)
    lastResultEl.textContent =
        `Rebirth #${rebirths}! Multiplier rewards and overall odds improved.`;
    log(`Rebirth #${rebirths} for $${formatNumber(cost)}.`);
    saveGame();
    updateUI();
}

function toggleAutoSpin() {
    autoSpin = !autoSpin;
    autoSpinBtn.textContent = `Auto Spin: ${autoSpin ? "ON" : "OFF"}`;
    if (autoSpin) {
        if (autoSpinInterval) clearInterval(autoSpinInterval);
        autoSpinInterval = setInterval(() => {
            if (!spinning && money >= SPIN_COST) {
                doSpin();
            }
        }, 250);
    } else {
        if (autoSpinInterval) clearInterval(autoSpinInterval);
        autoSpinInterval = null;
    }
}

function toggleAutoBuyLuck() {
    autoBuyLuck = !autoBuyLuck;
    autoBuyLuckBtn.textContent = `Auto Buy Luck: ${autoBuyLuck ? "ON" : "OFF"}`;
    if (autoBuyLuck) {
        if (autoBuyLuckInterval) clearInterval(autoBuyLuckInterval);
        autoBuyLuckInterval = setInterval(() => {
            const cost = getLuckCost();
            if (money >= cost) {
                buyLuck();
            }
        }, 500);
    } else {
        if (autoBuyLuckInterval) clearInterval(autoBuyLuckInterval);
        autoBuyLuckInterval = null;
    }
}

/* ---------- Event listeners ---------- */
spinBtn.addEventListener("click", doSpin);
buyLuckBtn.addEventListener("click", buyLuck);
rebirthBtn.addEventListener("click", doRebirth);
autoSpinBtn.addEventListener("click", toggleAutoSpin);
autoBuyLuckBtn.addEventListener("click", toggleAutoBuyLuck);

/* ---------- Init ---------- */
loadGame();
updateUI();
log("Game loaded. Start spinning!");

</script>
</body>
</html>
